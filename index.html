let currentCategory = "전체";

function goQuickLink(select) {
  const url = select.value;
  if (!url) return;
  window.open(url, "_blank");
  select.selectedIndex = 0;
}

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateFilterVisibility();
  updateDateFilterLabel();
  render();
}

function initQuickLinkMenu() {
  const quickBtn = document.querySelector('.quick-link-btn');
  const quickMenu = document.querySelector('.quick-link-menu');
  const quickLinks = document.querySelectorAll('.quick-link-menu a');
  const arrow = quickBtn ? quickBtn.querySelector('.arrow') : null;

  if (!quickBtn || !quickMenu) return;
  if (quickBtn.dataset.bound === 'true') return;
  quickBtn.dataset.bound = 'true';

  const closeMenu = () => {
    quickMenu.classList.remove('open');
    quickBtn.setAttribute('aria-expanded', 'false');
    if (arrow) arrow.textContent = '▼';
  };

  const openMenu = () => {
    quickMenu.classList.add('open');
    quickBtn.setAttribute('aria-expanded', 'true');
    if (arrow) arrow.textContent = '▲';
  };

  quickBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (quickMenu.classList.contains('open')) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  quickMenu.addEventListener('click', function(e) {
    e.stopPropagation();
  });

  quickLinks.forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      closeMenu();
      window.open(this.href, '_blank', 'noopener,noreferrer');
    });
  });

  document.addEventListener('click', function() {
    if (quickMenu.classList.contains('open')) {
      closeMenu();
    }
  });
}



function syncDateDisplay() {
  const input = document.getElementById('dateFilter');
  const display = document.getElementById('dateDisplay');
  if (!input || !display) return;

  if (!input.value) {
    display.textContent = currentCategory === '지급일' ? '지급일 선택' : '날짜 선택';
    return;
  }

  const parts = input.value.split('-');
  if (parts.length === 3) {
    display.textContent = `${parts[0]}-${parts[1]}-${parts[2]}`;
  } else {
    display.textContent = input.value;
  }
}

function initSearchInput() {
  const searchInput = document.getElementById('searchInput');
  const eventList = document.getElementById('eventList');
  if (!searchInput || !eventList) return;
  if (searchInput.dataset.bound === 'true') return;
  searchInput.dataset.bound = 'true';

  searchInput.addEventListener('focus', function() {
    const el = this;
    setTimeout(function() {
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 150);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      render();
      this.blur();
      setTimeout(function() {
        eventList.scrollIntoView({ block: 'start', behavior: 'smooth' });
      }, 80);
    }
  });
}

function extractDatesFromText(text) {
  const results = [];
  if (!text) return results;

  const fullMatches = text.match(/\d{4}-\d{2}-\d{2}/g) || [];
  fullMatches.forEach(d => {
    if (!results.includes(d)) results.push(d);
  });

  const shortMatches = text.match(/(?<!\d)(\d{2})-(\d{2})(?!\d)/g) || [];
  shortMatches.forEach(md => {
    const normalized = `2026-${md}`;
    if (!results.includes(normalized)) results.push(normalized);
  });

  return results;
}

function extractPayoutEntries(eventItem) {
  const source = eventItem.modalContent || '';
  if (!source) return [];

  const parser = new DOMParser();
  const doc = parser.parseFromString(source, 'text/html');
  const entries = [];
  const payoutLabelRegex = /(포인트 지급일|당첨자 발표일|포인트 및 랜덤티켓 증정일)/;
  const immediateRegex = /이벤트 조건.*즉시|조건을 충족하는 즉시|충족 즉시|지급 즉시|즉시 지급|즉시/;

  doc.querySelectorAll('.info-sections').forEach(group => {
    const children = [...group.children].filter(el => el.classList && (el.classList.contains('info-section') || el.classList.contains('info-row')));

    for (let i = 0; i < children.length; i++) {
      const el = children[i];
      if (!el.classList.contains('info-section')) continue;

      const sectionTitle = (el.querySelector('.info-section-title')?.textContent || '').trim();
      const rewardSummaries = [];

      el.querySelectorAll('.instant-point-row').forEach(row => {
        const label = (row.querySelector('.instant-point-label')?.textContent || '').trim();
        const value = (row.querySelector('.instant-point-value')?.textContent || '').trim();
        if (label || value) rewardSummaries.push([label, value].filter(Boolean).join(' · '));
      });

      el.querySelectorAll('.reward-row').forEach(row => {
        const cells = [...row.querySelectorAll('div')].map(v => v.textContent.trim()).filter(Boolean);
        if (cells.length) rewardSummaries.push(cells.join(' · '));
      });

      if (!rewardSummaries.length && sectionTitle) {
        rewardSummaries.push(sectionTitle);
      }

      if (!rewardSummaries.length) continue;

      let matched = false;

      el.querySelectorAll('.info-row').forEach(infoRow => {
        const label = (infoRow.querySelector('.info-label')?.textContent || '').trim();
        const value = (infoRow.querySelector('.info-value')?.textContent || '').trim();

        if (!payoutLabelRegex.test(label)) return;
        if (!value || immediateRegex.test(value)) return;

        const dates = extractDatesFromText(value);
        if (!dates.length) return;

        dates.forEach(dateStr => {
          rewardSummaries.forEach(summary => {
            entries.push({
              date: dateStr,
              title: eventItem.title,
              summary,
              event: eventItem
            });
          });
        });
        matched = true;
      });

      if (matched) continue;

      for (let j = i + 1; j < children.length; j++) {
        const sibling = children[j];

        if (sibling.classList.contains('info-section')) break;
        if (!sibling.classList.contains('info-row')) continue;

        const label = (sibling.querySelector('.info-label')?.textContent || '').trim();
        const value = (sibling.querySelector('.info-value')?.textContent || '').trim();

        if (!payoutLabelRegex.test(label)) continue;
        if (!value || immediateRegex.test(value)) break;

        const dates = extractDatesFromText(value);
        if (!dates.length) break;

        dates.forEach(dateStr => {
          rewardSummaries.forEach(summary => {
            entries.push({
              date: dateStr,
              title: eventItem.title,
              summary,
              event: eventItem
            });
          });
        });
        break;
      }
    }
  });

  const uniqueEntries = [];
  const seen = new Set();

  entries.forEach(item => {
    const key = `${item.date}__${item.title}__${item.summary}`;
    if (seen.has(key)) return;
    seen.add(key);
    uniqueEntries.push(item);
  });

  return uniqueEntries;
}

function renderPayoutSchedule() {
  const list = document.getElementById("eventList");
  list.className = "payout-list";
  list.innerHTML = "";

  const searchKeyword = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
  const selectedDate = document.getElementById("dateFilter")?.value || "";

  let payoutEntries = [];
  events.forEach(eventItem => {
    const payouts = Array.isArray(eventItem.payouts) ? eventItem.payouts : [];
    payouts.forEach(payout => {
      if (!payout || !payout.date || !payout.summary) return;
      payoutEntries.push({
        date: payout.date,
        title: eventItem.title,
        summary: payout.summary,
        event: eventItem
      });
    });
  });

  if (searchKeyword) {
    payoutEntries = payoutEntries.filter(item => {
      const haystack = [item.title, item.summary, item.date].join(" ").toLowerCase();
      return haystack.includes(searchKeyword);
    });
  }

  if (selectedDate) {
    payoutEntries = payoutEntries.filter(item => item.date === selectedDate);
  }

  payoutEntries.sort((a, b) =>
    a.date.localeCompare(b.date) ||
    a.title.localeCompare(b.title) ||
    a.summary.localeCompare(b.summary)
  );

  if (!payoutEntries.length) {
    list.innerHTML = '<div class="empty-state">해당 지급일 일정이 없습니다.</div>';
    return;
  }

  const grouped = {};
  payoutEntries.forEach(item => {
    if (!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });

  Object.keys(grouped).sort().forEach(dateKey => {
    const group = document.createElement("div");
    group.className = "payout-group";

    const heading = document.createElement("div");
    heading.className = "payout-date-heading";
    heading.textContent = dateKey;
    group.appendChild(heading);

    const itemsWrap = document.createElement("div");
    itemsWrap.className = "payout-items";

    const titleGrouped = {};
    grouped[dateKey].forEach(item => {
      const key = (item.title || "").trim();
      if (!titleGrouped[key]) titleGrouped[key] = [];
      titleGrouped[key].push(item);
    });

    Object.keys(titleGrouped).sort((a, b) => a.localeCompare(b)).forEach(title => {
      const accordionItem = document.createElement("div");
      accordionItem.className = "payout-accordion-item";

      const header = document.createElement("button");
      header.type = "button";
      header.className = "payout-accordion-header";
      header.setAttribute("aria-expanded", "false");
      header.innerHTML = `
        <span class="payout-accordion-title">${title}</span>
        <span class="payout-accordion-arrow">▼</span>
      `;

      const body = document.createElement("div");
      body.className = "payout-accordion-body";

      titleGrouped[title].forEach(item => {
        const detailRow = document.createElement("div");
        detailRow.className = "payout-detail-row";
        detailRow.innerHTML = `<div class="payout-detail-text">${item.summary}</div>`;
        detailRow.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(item.event);
        });
        body.appendChild(detailRow);
      });

      header.addEventListener("click", () => {
        const isOpen = accordionItem.classList.toggle("open");
        header.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      accordionItem.appendChild(header);
      accordionItem.appendChild(body);
      itemsWrap.appendChild(accordionItem);
    });

    group.appendChild(itemsWrap);
    list.appendChild(group);
  });
}

function getStatus(e) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const end = new Date(e.end);
  end.setHours(0, 0, 0, 0);

  if (today > end) return "지난";

  const diff = Math.floor((end - today) / (1000 * 60 * 60 * 24));

  if (diff === 0) return "오늘 마감";
  if (diff === 1) return "D-1";
  if (diff === 2) return "D-2";

  return "진행중";
}

function render() {
  const list = document.getElementById("eventList");
  list.className = "grid";
  list.innerHTML = "";

  if (currentCategory === "지급일") {
    renderPayoutSchedule();
    return;
  }

  let filtered = events.filter(e => {
    if (currentCategory !== "전체" && e.category !== "전체" && e.category !== currentCategory) {
      return false;
    }

    const searchKeyword = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
    if (searchKeyword) {
      const haystack = [
        e.title || "",
        e.category || "",
        e.detail || "",
        e.modalContent || ""
      ].join(" ").toLowerCase();
      if (!haystack.includes(searchKeyword)) return false;
    }

    const status = getStatus(e);
    const filter = document.getElementById("statusFilter").value;

    // 기본 상태(전체/진행중)에서는 지난 이벤트를 숨기고,
    // 지난 이벤트는 '지난 이벤트' 필터에서만 보이게 함
    if (filter === "지난") {
      if (status !== "지난") return false;
    } else {
      if (status === "지난") return false;
    }

    const date = document.getElementById("dateFilter").value;
    if (date) {
      const d = new Date(date);
      d.setHours(12, 0, 0, 0);

      const start = new Date(e.start);
      const end = new Date(e.end);
      start.setHours(0, 0, 0, 0);
      end.setHours(23, 59, 59, 999);

      if (!(start <= d && d <= end)) return false;
    }

    return true;
  });

  const sort = document.getElementById("sortFilter").value;

  if (sort === "urgent") {
  filtered.sort((a, b) => new Date(a.end) - new Date(b.end));
} else {
  filtered.sort((a, b) => new Date(b.start) - new Date(a.start));
}

  filtered.forEach(e => {
    const status = getStatus(e);

    let badgeClass = "ongoing";
    if (status === "오늘 마감" || status === "D-1" || status === "D-2" || status === "임박") badgeClass = "urgent";
    if (status === "지난") badgeClass = "done";

    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(e);

    card.innerHTML = `
      <div class="card-banner">${e.title}</div>
      <div class="card-body">
        <div class="card-date">${e.start} ~ ${e.end}</div>
        <div class="badge ${badgeClass}">${status}</div>
      </div>
    `;

    list.appendChild(card);
  });
}

function openModal(e) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = e.title;
  document.getElementById("modalDetail").innerHTML = e.modalContent || `
    <div class="modal-text">${e.detail || ''}</div>
    <div class="modal-actions">
      <a href="${e.url}" target="_blank" rel="noopener noreferrer" class="go-btn">이벤트 이동</a>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.addEventListener("keydown", function(event) {
  if (event.key === "Escape") {
    closeModal();
  }
});


syncDateDisplay();
updateFilterVisibility();
updateDateFilterLabel();
initSearchInput();
initQuickLinkMenu();
render();

</script>

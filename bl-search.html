<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BL 이벤트 작품 검색</title>
  <style>
    :root {
      --bg:#f7f4ef; --card:#ffffff; --text:#302a27; --muted:#7c706b; --line:#e8dfda;
      --accent:#9f757e; --accent-weak:#f4eeee; --danger:#9b3b35; --ok:#3f6d4a;
      --shadow:0 8px 24px rgba(70,55,48,.07); --radius:16px; --mobile-cart-height:68px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    body.modal-open{overflow:hidden}
    a{color:inherit;text-decoration:none}
    .page{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:28px 0 48px}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:start}
    header{margin-bottom:18px}
    .title{margin:0 0 6px;font-size:clamp(24px,5vw,36px);letter-spacing:-.04em}
    .desc{margin:0;color:var(--muted);font-size:14px}
    .panel{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
    .search-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:12px}
    .quick-row{display:grid;grid-template-columns:1fr 1fr 1.25fr auto;gap:10px;align-items:center}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:800}
    input,select,button{width:100%;min-height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);font:inherit;padding:0 12px}
    input:focus,select:focus,button:focus{outline:2px solid rgba(159,117,126,.18);border-color:var(--accent)}
    button{cursor:pointer;font-weight:900;background:var(--accent);color:#fff;border-color:var(--accent);white-space:nowrap}
    button.secondary{background:#fff;color:var(--accent)}
    button.ghost{background:var(--accent-weak);color:var(--accent);border-color:transparent}
    button.danger{background:#fff;color:var(--danger);border-color:#e5c8c4}
    .detail-toggle{margin-top:12px;display:flex;gap:10px;align-items:center;justify-content:space-between}
    .detail-toggle button{width:auto;padding:0 14px}
    .active-summary{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .detail{display:none;border-top:1px dashed var(--line);margin-top:14px;padding-top:14px}
    .detail.open{display:block}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr .8fr;gap:10px}
    .price-range{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end}
    .tilde{color:var(--muted);padding-bottom:10px;font-weight:900}
    .actions{display:flex;gap:10px;margin-top:12px;justify-content:flex-end}
    .actions button{width:auto;padding:0 14px}
    .meta-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 10px;color:var(--muted);font-size:14px}
    .count strong{color:var(--text);font-size:18px}
    .list{display:grid;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:0 4px 14px rgba(70,55,48,.045);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
    .book-title{font-weight:950;font-size:16px;letter-spacing:-.03em;margin:0 0 3px;display:inline-block}
    .book-title:hover{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
    .book-meta{color:var(--muted);font-size:13px;margin:0}
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .badge{display:inline-flex;align-items:center;min-height:24px;padding:0 9px;border-radius:999px;font-size:12px;font-weight:900;background:var(--accent-weak);color:var(--accent)}
    .badge.price{background:#f2f2f2;color:#3d3935}.badge.type{background:#f4eee8;color:#6f5a50}
    .card-actions{display:grid;gap:8px;min-width:96px}
    .go,.cart-btn{min-height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;font-size:13px;font-weight:950;border:1px solid transparent;padding:0 12px}
    .go{background:var(--text);color:#fff}.go:hover{background:var(--accent)}
    .cart-btn{background:#fff;color:var(--accent);border-color:var(--line)}
    .cart-btn.added{background:var(--accent-weak);color:var(--accent);border-color:var(--accent-weak)}
    .empty,.error{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px 18px;text-align:center;color:var(--muted)}
    .error{color:var(--danger)}
    .load-more-wrap{margin-top:18px;display:flex;justify-content:center}
    .load-more-wrap button{width:min(280px,100%);min-height:46px}
    .cart-panel{position:sticky;top:0;max-height:calc(100vh - 20px);overflow:auto;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;backdrop-filter:blur(10px)}
    .cart-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
    .cart-title-row h2{margin:0;font-size:18px;letter-spacing:-.03em}
    .cart-mini-count{font-weight:950;color:var(--accent);background:var(--accent-weak);padding:4px 9px;border-radius:999px;font-size:12px}
    .target-row{margin-bottom:12px}
    .cart-stats{display:grid;gap:8px;margin:12px 0}
    .stat{background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px}
    .stat-label{display:block;color:var(--muted);font-size:12px;font-weight:900;margin-bottom:2px}
    .stat-value{font-size:18px;font-weight:950;letter-spacing:-.03em}.stat-value.ok{color:var(--ok)}.stat-value.danger{color:var(--danger)}
    .cart-tools{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
    .cart-list{display:grid;gap:8px;margin-top:12px}
    .cart-empty{color:var(--muted);font-size:13px;text-align:center;padding:20px 8px;border:1px dashed var(--line);border-radius:12px;background:#fff}
    .cart-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px}
    .cart-item-title{font-size:13px;font-weight:950;margin:0;line-height:1.35}.cart-item-meta{margin:3px 0 0;color:var(--muted);font-size:12px}
    .remove-btn{min-height:32px;padding:0 10px;border-radius:10px;font-size:12px;background:#fff;color:var(--danger);border-color:#e5c8c4}
    .mobile-cart-bar{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:30;min-height:56px;border-radius:16px;box-shadow:0 10px 28px rgba(70,55,48,.14);background:var(--text);color:#fff;border:0;padding:8px 10px 8px 14px;align-items:center;justify-content:space-between;gap:10px}
    .mobile-cart-text{min-width:0;text-align:left}.mobile-cart-text strong{display:block;font-size:14px}.mobile-cart-text span{display:block;font-size:12px;color:rgba(255,255,255,.72)}
    .mobile-cart-open{width:auto;min-height:38px;padding:0 13px;background:#fff;color:var(--text);border:0}
    .cart-sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.36);z-index:40}.cart-sheet-backdrop.open{display:block}
    .cart-sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-height:min(82vh,720px);overflow:auto;background:var(--bg);border-radius:22px 22px 0 0;padding:16px 14px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -10px 34px rgba(0,0,0,.22);transform:translateY(110%);transition:transform .22s ease}
    .cart-sheet.open{transform:translateY(0)}.sheet-handle{width:44px;height:5px;border-radius:999px;background:#d6cbc0;margin:0 auto 12px}.sheet-close{margin-top:10px}
    .float-nav{position:fixed;right:16px;bottom:18px;z-index:25;display:grid;gap:8px}
    .float-nav button{width:44px;height:44px;min-height:44px;border-radius:999px;padding:0;box-shadow:0 8px 20px rgba(70,55,48,.12);background:#fff;color:var(--accent);border-color:var(--line);font-size:18px}
    .hidden{display:none!important}
    @media(max-width:980px){
      body{padding-bottom:calc(var(--mobile-cart-height) + env(safe-area-inset-bottom))}
      .page{width:min(100% - 24px,1120px);padding-top:18px}.layout{display:block}.desktop-cart{display:none}
      .panel{padding:13px;border-radius:15px}.search-row,.quick-row,.detail-grid{grid-template-columns:1fr}
      .detail-toggle{align-items:stretch;flex-direction:column}.detail-toggle button{width:100%}.active-summary{white-space:normal}
      .card{grid-template-columns:1fr}.card-actions{grid-template-columns:1fr 1fr;min-width:0}.go,.cart-btn{width:100%}
      .meta-bar{align-items:flex-start;flex-direction:column}.actions{flex-direction:column}.actions button{width:100%}
      .mobile-cart-bar{display:flex}.float-nav{right:16px;bottom:calc(var(--mobile-cart-height) + 24px + env(safe-area-inset-bottom))}
    }
    @media(max-width:420px){.card-actions{grid-template-columns:1fr}.float-nav button{width:40px;height:40px;min-height:40px}}
  
    .mobile-filter-toggle{display:none;margin:10px 0 0}
    .mobile-filter-body{display:block}
    @media(max-width:980px){
      .panel{position:sticky;top:8px;padding:12px}
      .mobile-filter-toggle{display:block;width:100%;min-height:44px}
      .mobile-filter-body{display:none;margin-top:10px}
      .mobile-filter-body.open{display:block}
      .search-row{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:0}
      .search-row button{min-height:44px}
      .quick-row{grid-template-columns:1fr}
      .detail-toggle{margin-top:10px}
    }

  
    .desktop-side{position:sticky;top:0;display:grid;gap:12px;max-height:calc(100vh - 20px)}
    .side-search-panel{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;backdrop-filter:blur(10px)}
    .side-search-panel .search-row{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:0}
    .side-search-panel .search-row input{min-height:40px}
    .side-search-panel .search-row button{min-height:40px}
    .side-search-panel .search-row label{margin-bottom:5px}
    .desktop-cart-toggle{width:100%;min-height:42px;margin-bottom:10px}
    .compact-cart.collapsed .desktop-cart-body{display:none}
    .desktop-side .cart-panel{position:static;max-height:calc(100vh - 170px)}
    @media(min-width:981px){
      .main-col .search-row{display:none}
      .main-col #mainSearchSlot + .search-row{display:none}
    }
    @media(max-width:980px){
      .desktop-side{display:none}
      .main-col .search-row{display:grid}
    }

  
    .back-to-main-wrap{width:min(1280px,calc(100% - 32px));margin:14px auto 0;display:flex;justify-content:flex-start}
    .back-to-main{display:inline-block;padding:9px 14px;background:#f4eeee;color:#6f5a50;border:1px solid #ddcaca;border-radius:9px;font-weight:700;font-size:13px;text-decoration:none}
    .back-to-main:hover{background:#eadede}
    @media(max-width:980px){.back-to-main-wrap{width:min(100% - 24px,1120px);margin-top:12px}}

  
    /* Indie pink / brown / beige tuning */
    body{background:#faf7f5;color:#302a27}
    button{background:#b98a92;border-color:#b98a92;color:#fff}
    button:hover{filter:brightness(.98)}
    button.secondary{background:#ffffff;color:#6f5a50;border-color:#e8dfda}
    button.ghost{background:#f4eeee;color:#6f5a50;border-color:#e8dfda}
    .go{background:#6f5a50;color:#fff}
    .go:hover{background:#5f4c43}
    .cart-btn{background:#fff;color:#9f757e;border-color:#ddcaca}
    .cart-btn.added{background:#fff7f3;color:#6f5a50;border-color:#b98a92}
    .badge{background:#f2ebe4;color:#6f5a50}
    .badge.price{background:#f7f1eb;color:#5f4c43}
    .badge.type{background:#f4eeee;color:#6f5a50}
    .panel,.cart-panel,.side-search-panel,.card,.stat,.cart-item{background:rgba(255,250,247,.92);border-color:#e8dfda}
    .book-title:hover{color:#9f757e}
    .back-to-main{background:#6f5a50!important;color:#fff!important;border-color:#6f5a50!important}
    .back-to-main:hover{background:#5f4c43!important}
    .mobile-cart-bar{background:#6f5a50}
    .mobile-cart-open{background:#ffffff;color:#6f5a50}
    .float-nav button{background:#ffffff;color:#6f5a50;border-color:#e8dfda}

  
    /* Soft rose / greige final tuning */

      --text:#302a27!important;
      --muted:#7c706b!important;

    /* Main-page-like width + richer dried rose accents */
    @media(min-width:981px){
      .back-to-main-wrap,
      .page{
        width:min(1000px,calc(100% - 40px))!important;
        max-width:1000px!important;
      }
      .page{

      }

    .card-banner,

    }

    .tabs button.active,

    /* Price option / card action alignment fix */
    @media(min-width:981px){
      .card{
        grid-template-columns:minmax(0,1fr) 116px!important;
        padding-right:18px!important;
      }
      .card-actions{

        width:96px!important;
        min-width:96px!important;
      }

    /* =========================

    }

    }
    .badge.discount{
      background:#ead8c6!important;

    function saveTarget(v){state.targetPrice=toNumber(v);localStorage.setItem(TARGET_STORAGE_KEY,String(state.targetPrice||""));if(els.sortBy.value.startsWith("underRemain"))applyFilters();else renderCart()}
    function escapeHtml(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function buildCartHtml(){const items=getCartItems(),count=items.length,total=getCartTotal(),target=Number(state.targetPrice||0),remain=target-total,remainText=target?(remain>=0?`${formatPrice(remain)} 남음`:`${formatPrice(Math.abs(remain))} 초과`):"목표금액 없음",remainClass=target?(remain>=0?"ok":"danger"):"";const wrap=document.createElement("div");wrap.innerHTML=`<div class="cart-title-row"><h2>장바구니</h2><span class="cart-mini-count">${count}개</span></div><div class="target-row"><label for="targetPriceInput">목표금액</label><input id="targetPriceInput" inputmode="numeric" placeholder="예: 20000" value="${target?target:""}"></div><div class="cart-stats"><div class="stat"><span class="stat-label">총액</span><span class="stat-value">${formatPrice(total)}</span></div><div class="stat"><span class="stat-label">목표까지</span><span class="stat-value ${remainClass}">${remainText}</span></div></div><div class="cart-tools"><button type="button" class="danger" data-action="clear">장바구니 비우기</button></div>`;const list=document.createElement("div");list.className="cart-list";if(!items.length){const e=document.createElement("div");e.className="cart-empty";e.textContent="담은 작품이 없습니다.";list.appendChild(e)}else items.forEach(item=>{const row=document.createElement("div");row.className="cart-item";row.innerHTML=`<div><p class="cart-item-title">${escapeHtml(item.title||"(제목 없음)")}</p><p class="cart-item-meta">${escapeHtml(item.author||"작가 정보 없음")} · ${formatPrice(item.price)}</p></div><button type="button" class="remove-btn" data-remove-id="${escapeHtml(item.id)}">빼기</button>`;list.appendChild(row)});wrap.appendChild(list);return wrap}
    function renderCartMount(mount){mount.innerHTML="";const cart=buildCartHtml();mount.appendChild(cart);const input=mount.querySelector("#targetPriceInput");if(input)input.addEventListener("input",debounce(e=>saveTarget(e.target.value),180));const clear=mount.querySelector('[data-action="clear"]');if(clear)clear.addEventListener("click",clearCart);mount.querySelectorAll("[data-remove-id]").forEach(b=>b.addEventListener("click",()=>removeFromCart(b.getAttribute("data-remove-id"))))}
    function renderCart(){renderCartMount(els.desktopCartMount);renderCartMount(els.mobileCartMount);const count=state.cartIds.size,total=getCartTotal(),target=Number(state.targetPrice||0),remain=target-total;els.mobileCartSummary.textContent=`장바구니 ${count}개 · 총 ${formatPrice(total)}`;els.mobileRemainSummary.textContent=!target?"목표금액을 입력하면 남은금액이 표시됩니다":remain>=0?`목표까지 ${formatPrice(remain)} 남음`:`목표보다 ${formatPrice(Math.abs(remain))} 초과`}
    function openCartSheet(){els.cartSheetBackdrop.classList.add("open");els.cartSheet.classList.add("open");document.body.classList.add("modal-open")}
    function closeCartSheet(){els.cartSheetBackdrop.classList.remove("open");els.cartSheet.classList.remove("open");document.body.classList.remove("modal-open")}
    function debounce(fn,delay){let timer;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),delay)}}
    function bindEvents(){initTopRidiLink();els.searchBtn.addEventListener("click",applyFilters);els.q.addEventListener("input",debounce(applyFilters,180));els.discountFilter.addEventListener("change",applyFilters);els.pricePreset.addEventListener("change",()=>{if(els.pricePreset.value){els.minPrice.value="";els.maxPrice.value=""}applyFilters()});els.sortBy.addEventListener("change",applyFilters);els.resetTopBtn.addEventListener("click",resetAll);els.detailBtn.addEventListener("click",()=>{const open=!els.detail.classList.contains("open");els.detail.classList.toggle("open",open);els.detailBtn.setAttribute("aria-expanded",String(open));els.detailBtn.textContent=open?"상세검색 닫기 ▴":"상세검색 열기 ▾"});els.applyDetailBtn.addEventListener("click",()=>{if(els.minPrice.value||els.maxPrice.value)els.pricePreset.value="";applyFilters()});els.resetDetailBtn.addEventListener("click",()=>resetDetail(true));[els.titleOnly,els.authorOnly,els.exclude,els.minPrice,els.maxPrice].forEach(input=>input.addEventListener("input",debounce(()=>{if(input===els.minPrice||input===els.maxPrice)els.pricePreset.value="";applyFilters()},200)));els.typeFilter.addEventListener("change",applyFilters);els.loadMoreBtn.addEventListener("click",()=>{state.visibleCount+=PAGE_SIZE;render()});els.openCartSheetBtn.addEventListener("click",openCartSheet);els.closeCartSheetBtn.addEventListener("click",closeCartSheet);els.cartSheetBackdrop.addEventListener("click",closeCartSheet);document.addEventListener("keydown",e=>{if(e.key==="Escape")closeCartSheet()});els.goTopBtn.addEventListener("click",()=>document.getElementById("top").scrollIntoView({behavior:"smooth",block:"start"}));els.goBottomBtn.addEventListener("click",()=>els.bottomAnchor.scrollIntoView({behavior:"smooth",block:"end"}))}
    async function loadData(){try{const res=await fetch("./events.json",{cache:"no-store"});if(!res.ok)throw new Error("events.json 파일을 찾을 수 없습니다.");state.raw=await res.json();if(!Array.isArray(state.raw))throw new Error("events.json은 배열 형식이어야 합니다.")}catch(e){els.error.classList.remove("hidden");els.error.textContent="events.json을 불러오지 못했습니다. index.html과 같은 위치에 events.json을 올려주세요.";state.raw=[]}state.items=state.raw.map(normalizeItem).filter(i=>i.title||i.author);loadCart();const valid=new Set(state.items.map(i=>i.id));state.cartIds=new Set([...state.cartIds].filter(id=>valid.has(id)));saveCart();populateFilters();bindEvents();applyFilters()}
    loadData();
  </script>

  <script>
    (function(){
      const btn = document.getElementById("mobileFilterToggle");
      const body = document.getElementById("mobileFilterBody");
      if(!btn || !body) return;
      function setOpen(open){
        body.classList.toggle("open", open);
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        btn.textContent = open ? "필터 접기 ▴" : "필터 열기 ▾";
      }
      btn.addEventListener("click", function(){ setOpen(!body.classList.contains("open")); });
      const mq = window.matchMedia("(max-width: 980px)");
      function init(){ if(mq.matches) setOpen(false); else setOpen(true); }
      mq.addEventListener("change", init);
      init();
    })();
  </script>


  <script>
    (function(){
      const searchRow = document.querySelector(".search-row");
      const mainSlot = document.getElementById("mainSearchSlot");
      const sideSlot = document.getElementById("sideSearchMount");
      const mq = window.matchMedia("(min-width: 981px)");

      function placeSearch(){
        if(!searchRow || !mainSlot || !sideSlot) return;
        if(mq.matches){
          if(searchRow.parentElement !== sideSlot) sideSlot.appendChild(searchRow);
        } else {
          if(searchRow.parentElement !== mainSlot.parentElement) {
            mainSlot.insertAdjacentElement("afterend", searchRow);
          }
        }
      }

      mq.addEventListener("change", placeSearch);
      placeSearch();

      const cartPanel = document.querySelector(".compact-cart");
      const cartToggle = document.getElementById("desktopCartToggle");
      const cartBody = document.getElementById("desktopCartBody");

      function setCartOpen(open){
        if(!cartPanel || !cartToggle || !cartBody) return;
        cartPanel.classList.toggle("collapsed", !open);
        cartToggle.setAttribute("aria-expanded", open ? "true" : "false");
        cartToggle.textContent = open ? "장바구니 접기 ▴" : "장바구니 열기 ▾";
      }

      if(cartToggle){
        cartToggle.addEventListener("click", function(){
          const isCollapsed = cartPanel.classList.contains("collapsed");
          setCartOpen(isCollapsed);
        });
        setCartOpen(false);
      }
    })();
  </script>
